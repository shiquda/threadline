services:
  gateway:
    build:
      context: .
    image: threadline:production
    init: true
    restart: unless-stopped
    env_file:
      - ${THREADLINE_ENV_FILE:-.env.production}
    environment:
      THREADLINE_HOST: 0.0.0.0
      THREADLINE_PORT: 3000
      THREADLINE_DATABASE: /data/threadline.sqlite
      THREADLINE_WEB_DIR: /app/public
    ports:
      - "127.0.0.1:${THREADLINE_HTTP_PORT:-3000}:3000"
    volumes:
      - threadline-data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  threadline-data:
